# Automated releases with semantic-release.
# Runs on push to main; publishes to npm and creates a GitHub release only when
# there are relevant conventional commits (fix:, feat:, BREAKING CHANGE:).
#
# npm: uses Trusted Publishers (OIDC). Configure the workflow on npmjs.com:
#   Package → Settings → Trusted publishing → GitHub Actions → Workflow filename: release.yml
# GITHUB_TOKEN is provided by GitHub Actions. No NPM_TOKEN needed for publish.
# @see https://docs.npmjs.com/trusted-publishers

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Lint
        run: pnpm run lint

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
